<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Plume</title>
    <script>
      // Apply the saved theme before first paint so a light-mode user doesn't
      // get a dark flash (the default :root is dark). Mirrors THEME_KEY in +page.
      // On first run (no saved pref), honor the OS prefers-color-scheme.
      try {
        var t = localStorage.getItem("markdown-theme");
        var resolved = t === "light" || t === "dark"
          ? t
          : (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
        document.documentElement.setAttribute("data-theme", resolved);
      } catch (e) {}
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
